---
layout: default
title: Events
permalink: /events/
---

<section class="py-16">
  <div class="max-w-6xl mx-auto px-4">
    <h1 class="font-heading text-4xl font-bold text-center mb-10">Upcoming Events</h1>
    {% if site.data.events.size > 0 %}
    <div class="grid md:grid-cols-3 gap-6">
      {% for event in site.data.events %}
        {% include event-card.html event=event %}
      {% endfor %}
    </div>
    {% else %}
    <p class="text-center text-gray-400">No upcoming events. Check back soon!</p>
    {% endif %}
  </div>
</section>
